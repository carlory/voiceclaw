name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          cache-dependency-path: voice-server/poetry.lock

      - name: Install dependencies
        working-directory: voice-server
        run: poetry install --with dev

      - name: Lint with ruff
        working-directory: voice-server
        run: poetry run ruff check src/ tests/

      - name: Type check with mypy
        working-directory: voice-server
        run: poetry run mypy src/
        continue-on-error: true  # Don't fail on type errors for now

      - name: Run tests
        working-directory: voice-server
        run: poetry run pytest -v --tb=short

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-client/package-lock.json

      - name: Install dependencies
        working-directory: web-client
        run: npm ci

      - name: Build
        working-directory: web-client
        run: npm run build

      - name: Lint
        working-directory: web-client
        run: npm run lint
        continue-on-error: true
