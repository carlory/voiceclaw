name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint voice-server
        working-directory: voice-server
        run: ruff check src/ tests/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web-client
        run: npm ci

      - name: Build
        working-directory: web-client
        run: npm run build

      - name: Lint
        working-directory: web-client
        run: npm run lint
        continue-on-error: true

  # NOTE: Backend tests require Apple Silicon (MLX).
  # Run locally: cd voice-server && poetry run pytest -v
